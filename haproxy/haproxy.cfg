global
    log stdout format raw local0

defaults
    log global
    mode http
    option httplog
    option dontlognull
    timeout connect 5s
    timeout client 300s
    timeout server 300s

frontend argyll
    bind *:8080
    option forwardfor
    http-request set-header X-Forwarded-Proto http

    acl write_webhook path_beg /webhook/
    acl write_method method POST PUT DELETE PATCH
    acl write_step path_beg /engine/step
    acl write_flow path -i /engine/flow

    use_backend argyll_write if write_webhook
    use_backend argyll_write if write_method write_step
    use_backend argyll_write if write_method write_flow
    default_backend argyll_read

backend argyll_read
    option httpchk GET /health
    http-check expect status 200
    default-server inter 15s fastinter 5s downinter 30s rise 2 fall 2
    server argyll-engine-1 argyll-engine-1:8080 check
    server argyll-engine-2 argyll-engine-2:8080 check
    server argyll-engine-3 argyll-engine-3:8080 check

backend argyll_write
    option httpchk GET /health
    http-check expect hdr name X-Argyll-Raft-State value leader
    default-server inter 3s fastinter 1s downinter 5s rise 1 fall 1
    server argyll-engine-1 argyll-engine-1:8080 check
    server argyll-engine-2 argyll-engine-2:8080 check
    server argyll-engine-3 argyll-engine-3:8080 check
