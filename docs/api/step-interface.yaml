openapi: 3.0.3
info:
  title: Argyll Step Interface Contract
  version: 2.0.0
  description: |
    HTTP steps are JSON endpoints invoked by the Argyll engine. The request body is the step's input arguments. Argyll execution context is sent in HTTP headers. Successful responses return output arguments directly. Failed responses use HTTP status codes and RFC 9457 Problem Details (`application/problem+json`).

    Sync steps complete in the initial HTTP response. Async steps return a quick 2xx response, then complete later by POSTing outputs or problem details to the webhook URL provided in `Argyll-Webhook-URL`.

servers:
  - url: "{protocol}://{host}:{port}"
    variables:
      protocol:
        enum: [http, https]
        default: http
      host:
        default: localhost
      port:
        default: "8081"

paths:
  /{stepEndpoint}:
    post:
      summary: Execute Step
      description: |
        Execute a step with JSON input arguments.

        The engine may invoke steps with the configured method (`GET`, `POST`, `PUT`, or `DELETE`). For `POST`, `PUT`, and `DELETE`, the request body is a JSON object containing the step arguments. For `GET`, no body is sent; endpoint placeholders are resolved from runtime arguments.

        Use `Argyll-Flow-ID`, `Argyll-Step-ID`, and `Argyll-Receipt-Token` as the idempotency key for side effects. Async steps also receive `Argyll-Webhook-URL`.
      operationId: executeStep
      tags:
        - Step Execution
      parameters:
        - name: stepEndpoint
          in: path
          required: true
          schema:
            type: string
          example: process-text
        - $ref: "#/components/parameters/ArgyllFlowID"
        - $ref: "#/components/parameters/ArgyllStepID"
        - $ref: "#/components/parameters/ArgyllReceiptToken"
        - $ref: "#/components/parameters/ArgyllWebhookURL"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Args"
            examples:
              simpleProcessor:
                summary: Simple text processing
                value:
                  input_text: "Hello World"
                  format: "uppercase"
              dataEnrichment:
                summary: Data enrichment
                value:
                  user_id: "12345"
                  enrich_fields: ["profile", "preferences", "activity"]
      responses:
        "200":
          description: Step completed successfully and returned output arguments.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Args"
              examples:
                outputs:
                  value:
                    processed_text: "HELLO WORLD"
                    character_count: 11
                    processing_time_ms: 15
        "204":
          description: Step completed successfully with no outputs.
        "400":
          $ref: "#/components/responses/Problem"
        "404":
          $ref: "#/components/responses/Problem"
        "409":
          $ref: "#/components/responses/Problem"
        "422":
          $ref: "#/components/responses/Problem"
        "500":
          $ref: "#/components/responses/Problem"
        "503":
          $ref: "#/components/responses/Problem"

components:
  parameters:
    ArgyllFlowID:
      name: Argyll-Flow-ID
      in: header
      required: true
      schema:
        type: string
      description: Executing flow ID.
      example: wf-123
    ArgyllStepID:
      name: Argyll-Step-ID
      in: header
      required: true
      schema:
        type: string
      description: Step ID being invoked.
      example: text-processor
    ArgyllReceiptToken:
      name: Argyll-Receipt-Token
      in: header
      required: true
      schema:
        type: string
      description: Unique work-item token for idempotency.
      example: tok_abc123xyz
    ArgyllWebhookURL:
      name: Argyll-Webhook-URL
      in: header
      required: false
      schema:
        type: string
        format: uri
      description: Async steps POST completion outputs or problem details to this URL.
      example: http://localhost:8080/webhook/wf-123/text-processor/tok_abc123xyz

  schemas:
    Args:
      type: object
      description: JSON object containing step input or output arguments.
      additionalProperties: true
      example:
        input_text: "Hello World"
        format: "uppercase"
    ProblemDetails:
      type: object
      description: RFC 9457 Problem Details response.
      properties:
        type:
          type: string
          example: about:blank
        title:
          type: string
          example: Unprocessable Entity
        status:
          type: integer
          example: 422
        detail:
          type: string
          example: Invalid input format
        instance:
          type: string
          example: /flows/wf-123/steps/text-processor/tokens/tok_abc123xyz
      additionalProperties: true

  responses:
    Problem:
      description: Step failed. 4xx responses are permanent failures; 5xx responses are retryable according to step retry configuration.
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ProblemDetails"
          examples:
            validation:
              value:
                type: about:blank
                title: Unprocessable Entity
                status: 422
                detail: Invalid input format

security: []

tags:
  - name: Step Execution
    description: Step execution endpoint contract

x-implementation-notes: |
  Success: return 2xx with a JSON object containing output arguments, or 204 when there are no outputs.
  Permanent failure: return 4xx with `Content-Type: application/problem+json`.
  Retryable failure: return 5xx, timeout, or close the connection; Argyll records the work item as not completed and applies retry policy.
  Async completion: POST the same success output object or problem details object to `Argyll-Webhook-URL`.
