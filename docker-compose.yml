x-argyll-env: &argyll-env
  CATALOG_POSTGRES_URL: postgres://postgres:postgres@postgres:5432/argyll?sslmode=disable
  PARTITION_POSTGRES_URL: postgres://postgres:postgres@postgres:5432/argyll?sslmode=disable
  FLOW_POSTGRES_URL: postgres://postgres:postgres@postgres:5432/argyll?sslmode=disable
  CATALOG_POSTGRES_PREFIX: argyll
  PARTITION_POSTGRES_PREFIX: argyll
  FLOW_POSTGRES_PREFIX: argyll
  CATALOG_POSTGRES_MAX_CONNS: "96"
  PARTITION_POSTGRES_MAX_CONNS: "96"
  FLOW_POSTGRES_MAX_CONNS: "96"
  LOG_LEVEL: debug

x-step-env: &step-env
  ARGYLL_ENGINE_URL: http://argyll-engine:8080

services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: argyll
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d argyll"]
      interval: 3s
      timeout: 2s
      retries: 10
      start_period: 5s

  argyll-engine:
    build:
      context: .
      dockerfile: engine/Dockerfile
    environment:
      <<: *argyll-env
      API_PORT: "8080"
      API_HOST: 0.0.0.0
      WEBHOOK_BASE_URL: http://argyll-engine:8080
      DEV_MODE: "true"
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 15s

  argyll-ui:
    build:
      context: ./web
      dockerfile: Dockerfile.dev
    volumes:
      - ./web:/app
      - /app/node_modules # Don't mount node_modules
      - /app/dist # Don't mount dist directory
    ports:
      - "3001:3001"
    environment:
      - VITE_API_URL=http://localhost:8080
      - VITE_WS_URL=ws://localhost:8080/engine/ws
      - CHOKIDAR_USEPOLLING=true # For better file watching in Docker
      - NODE_ENV=development
    depends_on:
      argyll-engine:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:3001",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  # Example step services
  text-processor:
    build:
      context: .
      dockerfile: examples/simple-step/Dockerfile
    environment:
      <<: *step-env
      STEP_PORT: "8081"
      STEP_HOSTNAME: text-processor
    depends_on:
      argyll-engine:
        condition: service_healthy
    ports:
      - "8081:8081"
    restart: on-failure
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/health"]
      interval: 5s
      timeout: 3s
      retries: 8
      start_period: 10s

  user-resolver:
    build:
      context: .
      dockerfile: examples/user-resolver/Dockerfile
    environment:
      <<: *step-env
      STEP_PORT: "8082"
      STEP_HOSTNAME: user-resolver
    depends_on:
      argyll-engine:
        condition: service_healthy
    ports:
      - "8082:8082"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8082/health"]
      interval: 5s
      timeout: 3s
      retries: 8
      start_period: 10s

  inventory-resolver:
    build:
      context: .
      dockerfile: examples/inventory-resolver/Dockerfile
    environment:
      <<: *step-env
      STEP_PORT: "8083"
      STEP_HOSTNAME: inventory-resolver
    depends_on:
      argyll-engine:
        condition: service_healthy
    ports:
      - "8083:8083"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8083/health"]
      interval: 5s
      timeout: 3s
      retries: 8
      start_period: 10s

  order-creator:
    build:
      context: .
      dockerfile: examples/order-creator/Dockerfile
    environment:
      <<: *step-env
      STEP_PORT: "8084"
      STEP_HOSTNAME: order-creator
    depends_on:
      argyll-engine:
        condition: service_healthy
    ports:
      - "8084:8084"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8084/health"]
      interval: 5s
      timeout: 3s
      retries: 8
      start_period: 10s

  payment-processor:
    build:
      context: .
