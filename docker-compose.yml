      interval: 5s
      timeout: 3s
      retries: 8
      start_period: 10s

  notification-sender:
    build:
      context: .
      dockerfile: examples/notification-sender/Dockerfile
    environment:
      <<: *step-env
      STEP_PORT: "8087"
      STEP_HOSTNAME: notification-sender
    depends_on:
