x-step-env: &step-env
  ARGYLL_ENGINE_URL: http://argyll-engine-1:8080

services:
  argyll-proxy:
    image: haproxy:3.1-alpine
    depends_on:
      argyll-engine-1:
        condition: service_healthy
      argyll-engine-2:
        condition: service_healthy
      argyll-engine-3:
        condition: service_healthy
    ports:
      - "8080:8080"
    volumes:
      - ./haproxy/haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
    restart: unless-stopped
    dns:
      - 8.8.8.8
      - 8.8.4.4
    healthcheck:
      test: ["CMD", "haproxy", "-c", "-f", "/usr/local/etc/haproxy/haproxy.cfg"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 5s

  argyll-engine-1:
    build:
      context: .
      dockerfile: engine/Dockerfile
    environment:
      API_PORT: "8080"
      API_HOST: "0.0.0.0"
      WEBHOOK_BASE_URL: http://argyll-engine-1:8080
      LOG_LEVEL: debug
      RAFT_NODE_ID: argyll-1
      RAFT_ADDRESS: argyll-engine-1:9701
      RAFT_SERVERS: "argyll-1=argyll-engine-1:9701,argyll-2=argyll-engine-2:9701,argyll-3=argyll-engine-3:9701"
      RAFT_DATA_DIR: /data/argyll-raft
    volumes:
      - argyll-data-1:/data
    restart: unless-stopped
    dns:
      - 8.8.8.8
      - 8.8.4.4
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 15s

  argyll-engine-2:
    build:
      context: .
      dockerfile: engine/Dockerfile
    environment:
      API_PORT: "8080"
      API_HOST: "0.0.0.0"
      WEBHOOK_BASE_URL: http://argyll-engine-2:8080
      LOG_LEVEL: debug
      RAFT_NODE_ID: argyll-2
      RAFT_ADDRESS: argyll-engine-2:9701
      RAFT_SERVERS: "argyll-1=argyll-engine-1:9701,argyll-2=argyll-engine-2:9701,argyll-3=argyll-engine-3:9701"
      RAFT_DATA_DIR: /data/argyll-raft
    volumes:
      - argyll-data-2:/data
    restart: unless-stopped
    dns:
      - 8.8.8.8
      - 8.8.4.4
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 15s

  argyll-engine-3:
    build:
      context: .
      dockerfile: engine/Dockerfile
    environment:
      API_PORT: "8080"
      API_HOST: "0.0.0.0"
      WEBHOOK_BASE_URL: http://argyll-engine-3:8080
      LOG_LEVEL: debug
      RAFT_NODE_ID: argyll-3
      RAFT_ADDRESS: argyll-engine-3:9701
      RAFT_SERVERS: "argyll-1=argyll-engine-1:9701,argyll-2=argyll-engine-2:9701,argyll-3=argyll-engine-3:9701"
      RAFT_DATA_DIR: /data/argyll-raft
    volumes:
      - argyll-data-3:/data
    restart: unless-stopped
    dns:
      - 8.8.8.8
      - 8.8.4.4
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 15s

  argyll-ui:
    build:
      context: ./web
      dockerfile: Dockerfile.dev
    volumes:
      - ./web:/app
      - /app/node_modules # Don't mount node_modules
      - /app/dist # Don't mount dist directory
    ports:
      - "3001:3001"
    environment:
      - VITE_API_URL=http://localhost:8080
      - VITE_WS_URL=ws://localhost:8080/engine/ws
      - CHOKIDAR_USEPOLLING=true # For better file watching in Docker
      - NODE_ENV=development
    depends_on:
      argyll-proxy:
        condition: service_healthy
    restart: unless-stopped
    dns:
      - 8.8.8.8
      - 8.8.4.4
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:3001",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  # Example step services
  text-processor:
    build:
      context: .
      dockerfile: examples/simple-step/Dockerfile
    environment:
      <<: *step-env
      STEP_PORT: "8090"
      STEP_HOSTNAME: text-processor
    depends_on:
      argyll-engine-1:
        condition: service_healthy
      argyll-engine-2:
        condition: service_healthy
      argyll-engine-3:
        condition: service_healthy
    ports:
      - "8090:8090"
    restart: on-failure
    dns:
      - 8.8.8.8
      - 8.8.4.4
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8090/health"]
      interval: 5s
      timeout: 3s
      retries: 8
      start_period: 10s

  user-resolver:
    build:
      context: .
      dockerfile: examples/user-resolver/Dockerfile
    environment:
      <<: *step-env
      STEP_PORT: "8091"
