        condition: service_healthy
    ports:
      - "8085:8085"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8085/health"]
      interval: 5s
      timeout: 3s
      retries: 8
      start_period: 10s

  stock-reservation:
    build:
      context: .
      dockerfile: examples/stock-reservation/Dockerfile
    environment:
      <<: *step-env
      STEP_PORT: "8086"
      STEP_HOSTNAME: stock-reservation
